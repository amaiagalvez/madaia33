name: Deploy to Dinahost (Web Hosting)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Normalize FTP server directory
        id: ftp_dir
        env:
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          normalized_dir="$FTP_SERVER_DIR"

          if [[ -z "$normalized_dir" ]]; then
            normalized_dir="/"
          fi

          if [[ "$normalized_dir" != */ ]]; then
            normalized_dir="$normalized_dir/"
          fi

          echo "server_dir=$normalized_dir" >> "$GITHUB_OUTPUT"

      - name: Deploy files via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          server-dir: ${{ steps.ftp_dir.outputs.server_dir }}
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.docs/**
            **/.git*/**
            **/.github/**
            **/.githooks/**            
            **/.kiro/**
            **/.vscode/**
            **/node_modules/**
            **/tests/**
            **/dc-data/**
            **/.env
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**