name: Deploy to Dinahost (Web Hosting)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy files via FTP
        timeout-minutes: 30
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -d -c "
            set cmd:fail-exit true;
            set dns:order inet;
            set net:timeout 20;
            set net:max-retries 1;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-max 10;
            set ftp:ssl-allow false;
            set ftp:ssl-force false;
            set ftp:ssl-protect-data false;
            set ftp:passive-mode true;
            set ftp:prefer-epsv false;
            open -u '$FTP_USERNAME','$FTP_PASSWORD' -p '$FTP_PORT' 'ftp://$FTP_SERVER';
            mirror -R --delete --verbose \
              --exclude-glob 'vendor/**' \
              --exclude-glob '.docs/**' \
              --exclude-glob '.git*' \
              --exclude-glob '.github/**' \
              --exclude-glob '.githooks/**' \
              --exclude-glob '.kiro/**' \
              --exclude-glob '.vscode/**' \
              --exclude-glob 'node_modules/**' \
              --exclude-glob 'tests/**' \
              --exclude-glob 'dc-data/**' \
              --exclude-glob '.env' \
              --exclude-glob 'storage/logs/*' \
              --exclude-glob 'storage/framework/cache/*' \
              --exclude-glob 'storage/framework/sessions/*' \
              --exclude-glob 'storage/framework/views/*' \
              . '$FTP_SERVER_DIR';
            bye
          "