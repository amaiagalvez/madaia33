name: Deploy to Dinahost (Web Hosting)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress
          --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare deploy payload
        id: deploy_payload
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          upload_dir=".deploy-sync/upload"
          delete_list=".deploy-sync/delete.txt"
          changes_file=".deploy-sync/changes.tsv"

          rm -rf .deploy-sync
          mkdir -p "$upload_dir"
          : > "$delete_list"
          : > "$changes_file"

          force_full_sync=false
          sync_build_assets=false

          is_excluded_path() {
            case "$1" in
              .git|.git/*|.gitattributes|.gitignore|.github/*|.docs/*|.kiro/*|.specify/*|.vscode/*|node_modules/*|tests/*|vendor/*|dc-data/*|.env|storage/*|composer.phar)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          should_sync_build_assets() {
            case "$1" in
              resources/*|package.json|package-lock.json|vite.config.js)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          stage_file_for_upload() {
            local path="$1"
            local target_dir

            target_dir="$upload_dir/$(dirname "$path")"
            mkdir -p "$target_dir"
            cp "$path" "$upload_dir/$path"
          }

          if [[ "$EVENT_NAME" != "push" || -z "$EVENT_BEFORE" || "$EVENT_BEFORE" =~ ^0+$ ]]; then
            force_full_sync=true
            echo "Workflow triggered without a reliable push base. Falling back to full sync."
          else
            git diff --name-status --find-renames "$EVENT_BEFORE" "$EVENT_SHA" > "$changes_file"

            if [[ ! -s "$changes_file" ]]; then
              echo "No files found in before..sha diff. Falling back to current commit file list."
              git show --name-status --find-renames --pretty='' "$EVENT_SHA" > "$changes_file"
            fi

            echo "Detected git changes:"
            if [[ -s "$changes_file" ]]; then
              cat "$changes_file"
            else
              echo "(none)"
            fi

            while IFS=$'\t' read -r status first_path second_path; do
              [[ -n "$status" ]] || continue

              case "$status" in
                D)
                  if ! is_excluded_path "$first_path"; then
                    printf '%s\n' "$first_path" >> "$delete_list"
                  fi
                  continue
                  ;;
                R* )
                  if ! is_excluded_path "$first_path"; then
                    printf '%s\n' "$first_path" >> "$delete_list"
                  fi
                  current_path="$second_path"
                  ;;
                *)
                  current_path="$first_path"
                  ;;
              esac

              if is_excluded_path "$current_path"; then
                echo "Skipping excluded path: $current_path"
                continue
              fi

              if [[ -f "$current_path" ]]; then
                echo "Staging upload: $current_path"
                stage_file_for_upload "$current_path"
              fi

              if should_sync_build_assets "$current_path"; then
                sync_build_assets=true
              fi
            done < "$changes_file"
          fi

          has_uploads=false
          has_deletions=false

          if find "$upload_dir" -type f -print -quit | grep -q .; then
            has_uploads=true
          fi

          if [[ -s "$delete_list" ]]; then
            has_deletions=true
          fi

          if [[ "$EVENT_NAME" == "push" && "$force_full_sync" != "true" && ! -s "$changes_file" ]]; then
            echo "::warning::Push diff did not produce a deploy payload. Forcing full sync to avoid missing changes."
            force_full_sync=true
          fi

          if [[ "$EVENT_NAME" == "push" && "$force_full_sync" != "true" && "$has_uploads" != "true" && "$sync_build_assets" != "true" && "$has_deletions" != "true" ]]; then
            echo "::warning::Incremental deploy resolved to empty payload on push. Forcing full sync as a safety fallback."
            force_full_sync=true
          fi

          echo "Deploy payload flags -> force_full_sync=$force_full_sync, has_uploads=$has_uploads, sync_build_assets=$sync_build_assets, has_deletions=$has_deletions"

          echo "force_full_sync=$force_full_sync" >> "$GITHUB_OUTPUT"
          echo "sync_build_assets=$sync_build_assets" >> "$GITHUB_OUTPUT"
          echo "has_uploads=$has_uploads" >> "$GITHUB_OUTPUT"
          echo "has_deletions=$has_deletions" >> "$GITHUB_OUTPUT"

      - name: Normalize FTP server directory
        id: ftp_dir
        env:
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          normalized_dir="$FTP_SERVER_DIR"

          if [[ -z "$normalized_dir" ]]; then
            normalized_dir="/"
          fi

          if [[ "$normalized_dir" != */ ]]; then
            normalized_dir="$normalized_dir/"
          fi

          echo "server_dir=$normalized_dir" >> "$GITHUB_OUTPUT"

      - name: Normalize FTP host
        id: ftp_host
        env:
          FTP_SERVER_RAW: ${{ secrets.FTP_SERVER }}
          FTP_PORT_RAW: ${{ secrets.FTP_PORT }}
        run: |
          ftp_host="$FTP_SERVER_RAW"
          ftp_port="$FTP_PORT_RAW"

          ftp_host="${ftp_host#ftp://}"
          ftp_host="${ftp_host#ftps://}"
          ftp_host="${ftp_host%%/*}"
          ftp_host="$(echo "$ftp_host" | tr -d '[:space:]')"

          if [[ "$ftp_host" == *:* ]]; then
            host_from_secret="${ftp_host%%:*}"
            port_from_secret="${ftp_host##*:}"

            ftp_host="$host_from_secret"

            if [[ -z "$ftp_port" && "$port_from_secret" =~ ^[0-9]+$ ]]; then
              ftp_port="$port_from_secret"
            fi
          fi

          if [[ -z "$ftp_port" ]]; then
            ftp_port="21"
          fi

          if [[ -z "$ftp_host" ]]; then
            echo "FTP_SERVER is empty after normalization."
            exit 1
          fi

          echo "host=$ftp_host" >> "$GITHUB_OUTPUT"
          echo "port=$ftp_port" >> "$GITHUB_OUTPUT"

      - name: Preflight FTP connectivity
        env:
          FTP_HOST: ${{ steps.ftp_host.outputs.host }}
          FTP_PORT: ${{ steps.ftp_host.outputs.port }}
        run: |
          preferred_port="$FTP_PORT"

          echo "Checking DNS for host: $FTP_HOST"
          if ! timeout 15 getent ahostsv4 "$FTP_HOST"; then
            echo "::warning::DNS lookup failed for $FTP_HOST. Continuing and letting lftp perform final connection checks."
          fi

          ports_to_try=("$preferred_port" "990" "21")
          reachable_port=""

          for candidate_port in "${ports_to_try[@]}"; do
            if [[ -z "$candidate_port" ]]; then
              continue
            fi

            echo "Checking TCP connectivity to $FTP_HOST:$candidate_port"
            if timeout 8 bash -lc "</dev/tcp/$FTP_HOST/$candidate_port"; then
              reachable_port="$candidate_port"
              break
            fi
          done

          if [[ -n "$reachable_port" ]]; then
            echo "Preflight connectivity succeeded on port $reachable_port"
          else
            echo "::warning::No FTP port responded during preflight. Continuing with deploy attempts (FTPS/FTP fallback)."
          fi

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy files via FTPS
        timeout-minutes: 30
        env:
          FTP_SERVER: ${{ steps.ftp_host.outputs.host }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ steps.ftp_host.outputs.port }}
          FTP_SERVER_DIR: ${{ steps.ftp_dir.outputs.server_dir }}
          FORCE_FULL_SYNC: ${{ steps.deploy_payload.outputs.force_full_sync }}
          SYNC_BUILD_ASSETS: ${{ steps.deploy_payload.outputs.sync_build_assets }}
          HAS_UPLOADS: ${{ steps.deploy_payload.outputs.has_uploads }}
          HAS_DELETIONS: ${{ steps.deploy_payload.outputs.has_deletions }}
        run: |
          set -euo pipefail

          fallback_port="21"

          full_sync_command="mirror -R --delete --verbose \
            --exclude-glob '.git' \
            --exclude-glob '.git/**' \
            --exclude-glob '.gitattributes' \
            --exclude-glob '.gitignore' \
            --exclude-glob '.github/**' \
            --exclude-glob '.docs/**' \
            --exclude-glob '.kiro/**' \
            --exclude-glob '.specify/**' \
            --exclude-glob '.vscode/**' \
            --exclude-glob 'node_modules/**' \
            --exclude-glob 'tests/**' \
            --exclude-glob 'vendor/**' \
            --exclude-glob 'dc-data/**' \
            --exclude-glob '.env' \
            --exclude-glob 'storage/logs/*' \
            --exclude-glob 'storage/framework/cache/*' \
            --exclude-glob 'storage/framework/sessions/*' \
            --exclude-glob 'storage/framework/views/*' \
            --exclude 'storage/**' \
            --exclude 'composer.phar' \
            . '$FTP_SERVER_DIR';"

          append_deploy_commands() {
            local command_file="$1"
            local staged_file
            local relative_path
            local relative_dir
            local remote_target_dir
            local remote_target_file

            if [[ "$FORCE_FULL_SYNC" == "true" ]]; then
              echo "$full_sync_command" >> "$command_file"
              return
            fi

            if [[ "$HAS_UPLOADS" == "true" ]]; then
              while IFS= read -r staged_file; do
                relative_path="${staged_file#.deploy-sync/upload/}"
                relative_dir="$(dirname "$relative_path")"
                remote_target_dir="$FTP_SERVER_DIR"
                remote_target_file="${FTP_SERVER_DIR}${relative_path}"

                if [[ "$relative_dir" != "." ]]; then
                  remote_target_dir="${FTP_SERVER_DIR}${relative_dir}"
                  printf "set cmd:fail-exit false; mkdir -p '%s'; set cmd:fail-exit true;\n" "$remote_target_dir" >> "$command_file"
                fi

                printf "put -o '%s' '%s';\n" "$remote_target_file" "$staged_file" >> "$command_file"
              done < <(find .deploy-sync/upload -type f | sort)
            fi

            if [[ "$SYNC_BUILD_ASSETS" == "true" ]]; then
              printf "%s\n" "mirror -R --delete --verbose public/build '${FTP_SERVER_DIR}public/build';" >> "$command_file"
            fi

            if [[ "$HAS_DELETIONS" == "true" ]]; then
              while IFS= read -r deleted_path; do
                [[ -n "$deleted_path" ]] || continue
                printf "rm -f '%s%s';\n" "$FTP_SERVER_DIR" "$deleted_path" >> "$command_file"
              done < .deploy-sync/delete.txt
            fi
          }

          build_lftp_script() {
            local command_file="$1"
            local protocol="$2"
            local port="$3"
            local ssl_allow="$4"
            local ssl_force="$5"
            local ssl_protect_data="$6"

            {
              printf "%s\n" "set cmd:fail-exit true"
              printf "%s\n" "set dns:order inet"
              printf "%s\n" "set net:timeout 20"
              printf "%s\n" "set net:max-retries 1"
              printf "%s\n" "set net:reconnect-interval-base 5"
              printf "%s\n" "set net:reconnect-interval-max 10"
              printf "%s\n" "set xfer:clobber on"
              printf "%s\n" "set ssl:verify-certificate no"
              printf "%s\n" "set ftp:ssl-allow $ssl_allow"
              printf "%s\n" "set ftp:ssl-force $ssl_force"
              printf "%s\n" "set ftp:ssl-protect-data $ssl_protect_data"
              printf "%s\n" "set ftp:passive-mode true"
              printf "%s\n" "set ftp:prefer-epsv false"
              printf "%s\n" "open -u '$FTP_USERNAME','$FTP_PASSWORD' -p '$port' '$protocol://$FTP_SERVER'"
              printf "%s\n" "echo 'Connected with $protocol'"
            } > "$command_file"

            append_deploy_commands "$command_file"
            echo "bye" >> "$command_file"
          }

          if [[ "$FORCE_FULL_SYNC" != "true" && "$HAS_UPLOADS" != "true" && "$SYNC_BUILD_ASSETS" != "true" && "$HAS_DELETIONS" != "true" ]]; then
            echo "No deployable file changes detected in this push. Skipping FTP sync."
            exit 0
          fi

          ftps_script="$(mktemp)"
          ftp_script="$(mktemp)"
          trap 'rm -f "$ftps_script" "$ftp_script"' EXIT

          build_lftp_script "$ftps_script" "ftps" "$FTP_PORT" "true" "true" "true"
          build_lftp_script "$ftp_script" "ftp" "$fallback_port" "false" "false" "false"

          echo "Deploy execution flags -> force_full_sync=$FORCE_FULL_SYNC, has_uploads=$HAS_UPLOADS, sync_build_assets=$SYNC_BUILD_ASSETS, has_deletions=$HAS_DELETIONS"

          set +e
          lftp -f "$ftps_script"
          ftps_exit_code=$?
          set -e

          if [[ $ftps_exit_code -eq 0 ]]; then
            echo "Deploy completed using FTPS."
            exit 0
          fi

          echo "FTPS failed (exit code: $ftps_exit_code). Trying FTP fallback..."
          echo "Using FTP fallback port: $fallback_port"

          lftp -f "$ftp_script"
