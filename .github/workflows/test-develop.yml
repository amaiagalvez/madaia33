name: Pest and Dusk Tests on Develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  pest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          touch /tmp/laravel_pest.sqlite

      - name: Run Pest unit and feature tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/laravel_pest.sqlite
          SESSION_DRIVER: file
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          RECAPTCHA_SKIP: true
        run: |
          php artisan migrate:fresh --seed --force
          php artisan test --compact tests/Unit tests/Feature

  dusk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: pest

    services:
      selenium:
        image: selenium/standalone-chromium:latest
        ports:
          - 4444:4444
        options: >-
          --shm-size=2g --add-host=host.docker.internal:host-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          touch /tmp/laravel_dusk.sqlite

      - name: Run migrations and seeders
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/laravel_dusk.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Start Laravel server
        env:
          APP_ENV: testing
          APP_URL: http://127.0.0.1:8000
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/laravel_dusk.sqlite
          SESSION_DRIVER: file
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          RECAPTCHA_SKIP: true
        run: |
          php artisan serve --host=0.0.0.0 --port=8000 > /tmp/laravel-serve.log 2>&1 &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 40); do
              if curl -sS http://127.0.0.1:8000 >/dev/null 2>&1; then
                  exit 0
              fi
              sleep 1
          done

          echo "Application did not start in time"
          cat /tmp/laravel-serve.log || true
          exit 1

      - name: Wait for Selenium to be ready
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:4444/wd/hub/status >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done

          echo "Selenium did not start in time"
          exit 1

      - name: Run Dusk browser tests
        env:
          APP_ENV: testing
          APP_URL: http://host.docker.internal:8000
          DUSK_DRIVER_URL: http://127.0.0.1:4444/wd/hub
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/laravel_dusk.sqlite
          SESSION_DRIVER: file
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          RECAPTCHA_SKIP: true
        run: php artisan test --compact tests/Browser
